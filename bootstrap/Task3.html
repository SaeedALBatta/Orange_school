<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bootstrap Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
  <div class="container">
                <i class="fa-solid fa-bars"></i>
            <i class="fa-solid fa-ellipsis-vertical"></i>

    <a class="navbar-brand fw-bold" href="#">Dashboard</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <form class="d-flex me-3">
        <input class="form-control" type="search" placeholder="Search">
      </form>
      <img src="https://headshots-inc.com/wp-content/uploads/2023/03/professional-Headshot-Example-4-1.jpg"
           class="rounded-circle" width="40" height="40">
    </div>
  </div>
</nav>

<div class="container my-4">

  <div class="row g-4">

    <div class="col-lg-4 col-md-6 col-sm-12">
      <div class="card shadow-sm">
        <div class="card-body text-center">
          <i class="fa-solid fa-dollar-sign fa-2x text-success mb-2"></i>
          <h5 class="card-title">Total Sales</h5>
          <p class="fs-4 fw-bold">$7,500</p>
        </div>
      </div>
    </div>

    <div class="col-lg-4 col-md-6 col-sm-12">
      <div class="card shadow-sm">
        <div class="card-body text-center">
          <i class="fa-solid fa-users fa-2x text-primary mb-2"></i>
          <h5 class="card-title">New Users</h5>
          <p class="fs-4 fw-bold">1,250</p>
        </div>
      </div>
    </div>

    <div class="col-lg-4 col-md-6 col-sm-12">
      <div class="card shadow-sm">
        <div class="card-body text-center">
          <i class="fa-solid fa-cart-shopping fa-2x text-warning mb-2"></i>
          <h5 class="card-title">Orders</h5>
          <p class="fs-4 fw-bold">3,200</p>
        </div>
      </div>
    </div>

    <div class="col-lg-4 col-md-6 col-sm-12">
      <div class="card shadow-sm">
        <div class="card-body text-center">
          <i class="fa-solid fa-ticket fa-2x text-danger mb-2"></i>
          <h5 class="card-title">Support Tickets</h5>
          <p class="fs-4 fw-bold">50</p>
        </div>
      </div>
    </div>

  </div>

  <!-- ===== TABLE ===== -->
  <div class="card mt-5 shadow-sm">
    <div class="card-header fw-bold">
      Transactions
    </div>
    <div class="card-body p-0">
      <table class="table table-striped mb-0 text-center">
        <thead class="table-dark">
          <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Status</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>#10001</td>
            <td>John Doe</td>
            <td><span class="badge bg-success">Paid</span></td>
            <td>$120</td>
          </tr>
          <tr>
            <td>#10002</td>
            <td>John Doe</td>
            <td><span class="badge bg-warning">Pending</span></td>
            <td>$120</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
