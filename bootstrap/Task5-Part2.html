<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Form Pages</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
    *{
        box-sizing: border-box;
    }
    body{
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        display: flex;
        flex-direction: column;
        min-height: 100vh; 
    }
    header{
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #001233;
        padding: 10px 20px;
    }
    .left{
        display: flex;
        justify-content: start;
        align-items: center;
        flex: 1;
    }
    .left img{
        height: 10vh;
    }
    .left span{
        padding-left: 5px ;
        color: #fe5001;
    }
    .left a {
        display: flex;
        justify-content: center;
        align-items: center;
        text-decoration: none;
    }
    .right nav {
        display: flex;
        align-items: center;
    }

    .right nav ul {
        display: flex;
        list-style: none;
        margin: 0;
        padding: 0;
        gap: 25px; 
    }

    .right nav ul li a {
        text-decoration: none;
        color: white;
        font-size: 16px;
        font-weight: 500;
    }

    .right nav ul li a:hover {
        color: #fe5001; 
    }

    .right nav ul li i {
        color: white;
        font-size: 18px;
        cursor: pointer;
    }
    
    main{
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        /* background-color: rgb(177, 57, 57); */
        color: #001233;
        padding: 2rem;
        gap: 4rem;
    }
    .one,.two,.three{
        width: 60vw;
        margin-bottom: 2rem;
    }
    .one h1{
        margin: 10px 0 ;
        text-align: center;
        font-size: 4rem;
    }
    .one p{
        text-align: center;
        font-size: 20px;
    }
    .two p{
        font-size: 8px;
        margin: 2px;
    }
    .three p{
        text-align: center;
        font-weight: bold;
        font-size: 12px;
        margin: 2px;
    }
    .two input{
        width: 100%;
        padding: 10px;
    }
    footer{
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: rgb(255, 204, 122);
        padding: 1rem 0;
    }
    .footer p {
        text-align: center;        
    }
    .footer p a {
        text-decoration: none;
        color: #001233;
    }
    i:hover{
        color: #fe5001;
    }
    @media (max-width: 576px) { 
        header{
            flex-direction: column;
        }
        .left img {
        height: 6vh;
        }
        .right nav ul{
            flex-direction: column;
            align-items: center;
        }
        .one h1{
            font-size: 24px;
        }
        .one p{
            font-size: 12px;
        }
        footer p {
        margin: 5px 0;
        font-size: 12px;
    }
    }
    
    @media (max-width: 996px) { 
        header{
            flex-direction: column;
        }
        .right nav ul{
            margin-top: 1rem;
        }
        .one h1{
            font-size: 2.5rem;
        }
        .one p{
            font-size: 12px;
        }


    }
    </style>
</head>
<body>
    <header>
        <div class="left">
            <a href="https://us.dollarshaveclub.com/?srsltid=AfmBOorPAMkoc1_wBUVcZ9xi-p48ffVJUNYa2jOmDiggrlOv5xG5ZnwY">
                <img src="../../HTML/Media/img/dsc-rebrand-logo.jpg" alt="Logo-Brande" >
                <span>DOLLAR SHAVE CLUB</span>
            </a>
        </div>
        <div class="right">
            <nav>
                <ul>
                    <li><a href="#">Shop</a></li>
                    <li><a href="#">OrginalCenter</a></li>
                    <li><a href="#">Gift</a></li>
                    <li><a href="#">Account</a></li>
                    <li><i class="fa-solid fa-cart-shopping"></i></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
            <div class="one">
                <h1>Contact Us</h1>
                <p>Question not answered yet?We are here to help!</p>
            </div>
            <div class="two">
                <p>HOE CAN WE HELP YOU TODAY?</p>
                <input type="text">
            </div>
            <div class="three">
                <p>Partnerships and Media Inquiries</p>
            </div>
    </main>
    <footer>
        <div class="footer">
            <p><a href="#">Questions not answred?</a></p>
            <p><a href="#">Contact Us<i class="fa-solid fa-caret-right"></i></a></p>
        </div>
    </footer>
</body>
</html>
