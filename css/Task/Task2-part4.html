<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 2 Part4</title>
    <style>
        *{
            box-sizing: border-box;
        }
        body{
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #03c8a7;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card{
            background-color: white;
            width: 400px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            text-align: center;
        }
        .card h1{
            text-align:center;
            font-weight:100;
            margin-bottom:30px;
        }
        .card label{
            color: #03c8a7;
            padding: 10px;
            font-size: small;
            text-align: left;
        }
        .card input{
            width: 100%;
            border: none;
            border-bottom: 1px solid #ccc;
        }
        .login-btn {
            margin: 20px;
            padding: 10px;
            background-color: #03c8a7;
            border: 1px solid #ccc;
            color: white;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>USER LOGIN</h1>
            <label>UserName</label>
            <input type="text" >
            <label>Password</label>
            <input type="password">
            <button class="login-btn">LOGIN</button>
            <p><a href="#">Forgot Password?</a></p>
    </div>
</body>
</html>
