<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0px;
        }
        .BANNER{
            background-color: rgb(119, 49, 8);
            padding: 4rem;
            font-size: 44px;
            font-weight: 900;
            text-align: center;
        }
        nav{
            width: 50%;
            margin: 0 auto;
        }
        nav ul  {
            list-style: none;
            display: flex;
            justify-content: space-between;
        }
        li{
            margin: 10px;
        }
        li a{
            text-decoration: none;
            color: black;
        }
        .seconde {
            background-color: rgb(219, 153, 33);
            margin-top: -20px;
            height: 75vh;

        }
        section{
            padding: 5px;
        }
        section h2{
            font-size: 26px;
            font-weight:bolder;
    
        }
        section p{
            font-size: 18px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="BANNER">THIS IS MY BANNER TEXT</div>
    <div class="seconde">
        <nav>
            <ul>
                <li><a href="#">HOME</a></li>
                <li><a href="#">INFO</a></li>
                <li><a href="#">CONTACT</a></li>
                <li><a href="#">HUBPAGES</a></li>
            </ul>
        </nav>
        <section>
            <h2> This Is My Paragraph Header</h2>
            <p style="color: rgb(119, 49, 8);">This is where I am going to put useful and informative text about my website.</p>
            <p style="color: rgb(119, 49, 8);">This is where I can place even more information about my website.</p>
            <p>This is where I can place a copyright logo like this &copy;</p>
        </section>
    </div>
</body>
</html>
