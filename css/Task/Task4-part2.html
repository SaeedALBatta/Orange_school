<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            box-sizing: border-box;
        }
        body{
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(78, 165, 253);
            display:flex ;
            justify-content: center;
            align-items: center;
        }
        .card{
            background-color: white;
            width: 400px;
            border: 1px solid #ccc;
            border-radius: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 20px;
            margin: 30px;
        }
        .card p {
            font-size: 12px;
            margin-top: -10px;
        }
        .card label{
            color:#2973e9;
            text-align: left;
            margin-bottom: -5px;
        }
        .card input {
            padding: 10px;
            margin-bottom: 5px;
        }
        .Regsister-btn {
            width: 100px;
            margin: 10px auto;
            padding: 10px;
            background: linear-gradient(90deg, #2973e9, #60EFFF);
            border-radius: 10px;
            border: none;
        }
        .card h1 ,p {
            color: #2973e9;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>CODEWITHRANDOM</h1>
        <p>Thank You For Beging With Me</p>
        <label>Name</label>
        <input type="text">
        <label>Email</label>
        <input type="text">
        <label>Password</label>
        <input type="text">
        <label>Reapeat Password</label>
        <input type="text">
        <button class="Regsister-btn">Regsister</button>
    </div>
</body>
</html>
