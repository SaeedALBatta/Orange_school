<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 1</title>
    <style>
        table , th ,td{
            border: 1px solid ;
            padding: 4px;
        }
        table {
            width: 400px;
            margin: 20px auto;
        }
        thead th {
            background-color: yellow;
        }
        #color-center {
            text-align: center;
            background-color:rgb(250, 131, 171);
        }
        caption {
            border-bottom: 1px solid gray;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <section>
        <table>
            <caption>Ninji Details</caption>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Grade</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td id="color-center">Ninja A</td>
                    <td>18</td>
                    <td>B</td>
                </tr>
                <tr>
                    <td>Ninja B</td>
                    <td>23</td>
                    <td>C</td>
                </tr>
                <tr>
                    <td>Ninja C</td>
                    <td>22</td>
                    <td>A</td>
                </tr>
            </tbody>
            <tfoot>
                    <th colspan="3">Ninja C - the best Learner!</th>
            </tfoot>
        </table>
    </section>
</body>
</html>
