<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Gallary</title>
    <style>
        *{
            margin: 0; padding: 0; box-sizing: border-box;
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
            line-height: 1.5;
            color: #333;
            padding: 1rem;
        }
        .gallery {
            display: flex;
            flex-wrap:  wrap;
            margin: -0.5rem;
        }
        .gallery img {
            flex: 1 1 calc(33% - 1rem);
            width: 10px;
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0.5rem;
        }
        @media (max-width: 800px){
            .gallery img{
                flex: 1 1 calc(50% - 1rem);
            }
        }
        @media (max-width: 500px){
            .gallery img{
                flex: 1 1 calc(100% - 1rem);
            }
        }
    </style>
</head>
<body>
    <section>
            <div class="gallery">
            <img src="../../HTML/Media/img/orange_logo.png"  alt="Image 1">
            <img src="../../HTML/Media/img/orange_logo.png"  alt="Image 2">
            <img src="../../HTML/Media/img/orange_logo.png"  alt="Image 3">
            <img src="../../HTML/Media/img/orange_logo.png"  alt="Image 4">
            <img src="../../HTML/Media/img/orange_logo.png"   alt="Image 5">
            <img src="../../HTML/Media/img/orange_logo.png"   alt="Image 6">
        </div>
  </section>
</body>
</html>
