<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Gallary</title>
    <style>
        *{
            margin: 0; padding: 0; box-sizing: border-box;
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
            line-height: 1.5;
            color: #333;
            padding: 1rem;
            margin: -16px;
        }
        .Numbers {
            display: flex;
            flex-wrap:  wrap;
            border: 2px solid rgb(250, 185, 6);
        }
        .Numbers div {
            flex: 0 0 25%;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            color: white;
        }
    </style>
</head>
<body>
    <section>
        <div class="Numbers">
            <div style="background-color: blue;">1</div>
            <div style="background-color: rgb(31, 188, 73);">2</div>
            <div style="background-color: rgb(123, 255, 0);">3</div>
            <div style="background-color: rgb(255, 0, 208);">4</div>
            <div style="background-color: rgb(0, 217, 255);">5</div>
            <div style="background-color: rgb(255, 0, 0);">6</div>
            <div style="background-color: rgb(245, 101, 182);">7</div>
            <div style="background-color: rgb(0, 255, 89);">8</div>
            <div class="nogrow" style="background-color: rgb(0, 255, 208);">9</div>
            <div class="nogrow" style="background-color: rgb(187, 255, 0);">10</div>
        </div>
  </section>
</body>
</html>
