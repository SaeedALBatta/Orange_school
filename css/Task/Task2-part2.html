<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task2-Part2</title>
    <style>
        body{
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f5f5f5;
        }
        .container{
            width: 400px;
            height: 80vh;
            margin: 80px auto;
        }
        .login-form{
            width: 350px;
            display: flex;
            flex-direction: column;
        }
        .login-form input{
            padding: 8px;
            margin: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .login-form label{
            padding: 0px 10px;
            color: #444;
        }
        .Login-btn{
            margin: 10px;
            padding: 10px;
            background-color: #5b9bd5;
            color: white;
            font-size: 16px;
            border: none ;
            border-radius: 5px;
            cursor: pointer;
        }
        nav{
            display: flex;
            justify-content: space-between;
            background-color: #e9e9e9;
            padding: 10px;
            margin: 20px;
        }
        nav span{
            font-size: 20px;
            font-weight: bold;
            color: #555;
        }
        .nav-link a {
            text-decoration: none;
            padding: 5px;
            color: #444;
        }
    </style>
</head>
<body>
    <nav>
        <span class="Brand">Scratch</span>
        <div class="nav-link">
            <a href="#">Signup</a>
            <a href="#">Login</a>
        </div>
    </nav>
    <div class="container">
            <form class="login-form">
                <label>Email</label>
                <input type="email">
                <label>Password</label>
                <input type="password">
                <button class="Login-btn">Login</button>
            </form>
    </div>
</body>
</html>
