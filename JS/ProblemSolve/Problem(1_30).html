        // Task 26
        function Task26 (){
            for(let i = 1 ; i <= 500 ; i++){
                let digit = i.toString().split("").map(Number);
                
                let sum = 0 ;
                let prodect = 1;

                for (let d of digit ){
                    sum += d;
                    prodect *= d;
                }
                let first = digit[0];
                let last = digit[digit.length - 1];

                let reverse = Number(digit.slice().reverse().join(""));
                if (reverse % 3 === 0){
                    document.write(i + "<br>");
                }
            }
        }

        // Task 28
        function Task28 (){
            for(let i = 1 ; i <= 500 ; i++){
                let digit = i.toString().split("").map(Number);
                

                if (digit.length < 2){
                    continue;
                };

                let isAscending = true;
                for (let j = 1 ; j < digit.length ; j++){
                    if (digit[j] !== digit[j-1]+1 ){
                        isAscending = false;
                        break;
                    }
                }
                if (isAscending){
                    document.write(i + "<br>");
                }
            }
        }

        function Task30 (){
            for(let i = 1 ; i <= 300 ; i++)
            {
                
                let digit = i.toString().split("").map(Number);
                
                if (digit.length < 3){
                    continue;
                };

                let last = digit[digit.length - 1];
                let sumWithoutLast = 0;
        
                for (let j = 0; j < digit.length - 1; j++) {
                    sumWithoutLast += digit[j];
                }
                if (last === sumWithoutLast) {
                    document.write(i + "<br>");
                }
                
            }
